<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeFlow — Головна</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
  <div id="app" class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg header-light sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="./index.html">
          <img src="./logo.svg" alt="TimeFlow" width="32" height="32">
          <span class="fw-bold text-dark">TimeFlow</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link text-dark" href="./about.html">Про додаток</a></li>
            <li class="nav-item"><a class="nav-link text-dark" href="./tracker.html">Трекер</a></li>
            <li class="nav-item" v-if="currentUser"><a class="nav-link text-dark" href="./profile.html">Профіль</a></li>
            <template v-else>
              <li class="nav-item"><a class="nav-link text-dark" href="./login.html">Вхід</a></li>
              <li class="nav-item ms-lg-2"><a class="btn btn-dark fw-bold" href="./register.html">Реєстрація</a></li>
            </template>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5 flex-grow-1">
      <div class="row g-4 align-items-center">
        <div class="col-12 col-lg-6 text-center text-lg-start">
          <p class="text-muted mb-2">Облік робочого часу</p>
          <h1 class="display-5 fw-bold mb-3">TimeFlow — просто і зручно</h1>
          <p class="lead text-secondary mb-4">
            Веб-додаток на VueJS з асинхронними запитами до Express-сервера та збереженням даних у SQLite.
          </p>
          <div class="d-flex gap-2 justify-content-center justify-content-lg-start flex-wrap">
            <a href="./tracker.html" class="btn btn-dark btn-lg">Відкрити трекер</a>
            <a href="./about.html" class="btn btn-outline-dark btn-lg">Дізнатись більше</a>
          </div>
        </div>
        <div class="col-12 col-lg-6">
          <div class="card shadow-sm border-0">
            <img src="./IMG_0844.JPG" alt="Ілюстрація TimeFlow" class="img-fluid rounded">
          </div>
        </div>
      </div>
    </main>

    <footer class="mt-auto">
      <div class="container py-3">
        <hr class="my-0 mb-3">
        <div class="small text-muted">© 2026 • TimeFlow</div>
      </div>
    </footer>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/common.js"></script>
  <script>
    Vue.createApp({ mixins: [NavbarMixin] }).mount('#app');
  </script>
</body>
</html>
