<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeFlow — Вхід</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
  <div id="app" class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg header-light sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="./index.html">
          <img src="./logo.svg" alt="TimeFlow" width="32" height="32">
          <span class="fw-bold text-dark">TimeFlow</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link text-dark" href="./about.html">Про додаток</a></li>
            <li class="nav-item"><a class="nav-link text-dark" href="./tracker.html">Трекер</a></li>
            <li class="nav-item"><a class="nav-link active text-dark" href="./login.html">Вхід</a></li>
            <li class="nav-item ms-lg-2"><a class="btn btn-dark fw-bold" href="./register.html">Реєстрація</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5 flex-grow-1">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">
          <h1 class="h2 fw-bold mb-1">Вхід</h1>
          <p class="text-secondary mb-4">Увійдіть у свій акаунт TimeFlow.</p>

          <form class="tf-panel" @submit.prevent="submitLogin">
            <div class="mb-3">
              <label class="form-label fw-semibold" for="loginEmail">Email</label>
              <input id="loginEmail" v-model.trim="form.email" class="form-control" type="email" placeholder="name@gmail.com">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" for="loginPassword">Пароль</label>
              <input id="loginPassword" v-model.trim="form.password" class="form-control" type="password" placeholder="••••••••">
            </div>
            <button class="btn btn-dark w-100 fw-bold" type="submit" :disabled="loading">
              {{ loading ? 'Вхід...' : 'Увійти' }}
            </button>
            <div v-if="message" :class="['mt-3', isSuccess ? 'text-success' : 'text-danger']">{{ message }}</div>
            <div class="text-center mt-3 small text-secondary">
              Немає акаунта?
              <a class="text-decoration-none" href="./register.html">Зареєструватися</a>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="mt-auto">
      <div class="container py-3">
        <hr class="my-0 mb-3">
        <div class="small text-muted">© 2026 • TimeFlow</div>
      </div>
    </footer>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/common.js"></script>
  <script>
    Vue.createApp({
      data() {
        return {
          form: { email: '', password: '' },
          message: '',
          isSuccess: false,
          loading: false
        };
      },
      async created() {
        try {
          await api.me();
          window.location.href = './profile.html';
        } catch (error) {}
      },
      methods: {
        async submitLogin() {
          this.message = '';
          this.isSuccess = false;
          this.loading = true;
          try {
            const response = await api.login(this.form);
            api.setToken(response.token);
            this.isSuccess = true;
            this.message = 'Вхід виконано успішно.';
            setTimeout(() => window.location.href = './profile.html', 500);
          } catch (error) {
            this.message = error.message;
          } finally {
            this.loading = false;
          }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
