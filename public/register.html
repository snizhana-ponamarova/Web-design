<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeFlow — Реєстрація</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
  <div id="app" class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg header-light sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="./index.html">
          <img src="./logo.svg" alt="TimeFlow" width="32" height="32">
          <span class="fw-bold text-dark">TimeFlow</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link text-dark" href="./about.html">Про додаток</a></li>
            <li class="nav-item"><a class="nav-link text-dark" href="./tracker.html">Трекер</a></li>
            <li class="nav-item"><a class="nav-link text-dark" href="./login.html">Вхід</a></li>
            <li class="nav-item ms-lg-2"><a class="btn btn-dark fw-bold" href="./register.html">Реєстрація</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5 flex-grow-1">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-7">
          <h1 class="h2 fw-bold mb-1">Реєстрація</h1>
          <p class="text-secondary mb-4">Створіть акаунт для роботи з TimeFlow.</p>

          <form class="tf-panel" @submit.prevent="submitRegister">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Ім’я</label>
                <input v-model.trim="form.firstName" class="form-control" type="text">
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Прізвище</label>
                <input v-model.trim="form.lastName" class="form-control" type="text">
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Email</label>
                <input v-model.trim="form.email" class="form-control" type="email" placeholder="name@gmail.com">
              </div>
              <div class="col-12">
                <label class="form-label fw-semibold">Пароль</label>
                <input v-model.trim="form.password" class="form-control" type="password" placeholder="••••••••">
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Стать</label>
                <select v-model="form.gender" class="form-select">
                  <option value="">Оберіть</option>
                  <option value="Жіноча">Жіноча</option>
                  <option value="Чоловіча">Чоловіча</option>
                  <option value="Інше">Інше</option>
                </select>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Дата народження</label>
                <input v-model="form.birthDate" class="form-control" type="date">
              </div>
              <div class="col-12">
                <button class="btn btn-dark w-100 fw-bold" type="submit" :disabled="loading">
                  {{ loading ? 'Реєстрація...' : 'Зареєструватися' }}
                </button>
              </div>
              <div class="col-12" v-if="message">
                <div :class="isSuccess ? 'text-success' : 'text-danger'">{{ message }}</div>
              </div>
              <div class="col-12 text-center small text-secondary">
                Вже є акаунт?
                <a class="text-decoration-none" href="./login.html">Увійти</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="mt-auto">
      <div class="container py-3">
        <hr class="my-0 mb-3">
        <div class="small text-muted">© 2026 • TimeFlow</div>
      </div>
    </footer>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/common.js"></script>
  <script>
    Vue.createApp({
      data() {
        return {
          form: {
            firstName: '',
            lastName: '',
            email: '',
            password: '',
            gender: '',
            birthDate: ''
          },
          message: '',
          isSuccess: false,
          loading: false
        };
      },
      async created() {
        try {
          await api.me();
          window.location.href = './profile.html';
        } catch (error) {}
      },
      methods: {
        async submitRegister() {
          this.message = '';
          this.isSuccess = false;
          this.loading = true;
          try {
            const response = await api.register(this.form);
            api.setToken(response.token);
            this.isSuccess = true;
            this.message = 'Реєстрація виконана успішно.';
            setTimeout(() => window.location.href = './profile.html', 500);
          } catch (error) {
            this.message = error.message;
          } finally {
            this.loading = false;
          }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
